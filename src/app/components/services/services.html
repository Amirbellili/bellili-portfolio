<section class="services" id="service">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">
        {{ 'SERVICES.TITLE' | translate }} <span class="highlight">{{ 'SERVICES.SERVICES' | translate }}</span>
      </h2>
      <p class="section-subtitle">{{ 'SERVICES.SUBTITLE' | translate }}</p>
    </div>

    <div class="services-grid">
      <div class="service-card" *ngFor="let service of services">
        <div class="service-icon">
          <i [class]="service.icon"></i>
        </div>
        <h3 class="service-title">{{ service.title | translate }}</h3>
        <p class="service-description">{{ service.description | translate }}</p>
      </div>
    </div>
  </div>
</section>
